<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Minimal Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --border-color: #2e2e2e;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --accent-color: #ffffff;
            --accent-hover: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        sidebar {
            width: 250px;
            background-color: #0a0a0a;
            border-right: 1px solid var(--border-color);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            z-index: 10;
        }

        sidebar .logo {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        sidebar nav ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        sidebar nav a {
            color: var(--text-sub);
            text-decoration: none;
            font-size: 0.95rem;
        }

        sidebar nav a.active {
            color: var(--text-main);
            font-weight: bold;
        }

        main {
            flex: 1;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            margin-bottom: 1.5rem;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            flex: 1;
            min-height: 0;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 0;
        }

        .card h2 {
            font-size: 1.1rem;
            font-weight: 500;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
        }

        input, textarea {
            background-color: #121212;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.6rem 0.8rem;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
        }

        button {
            background-color: var(--accent-color);
            color: #000000;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        /* 캔버스 마인드맵 스타일 */
        .mindmap-wrapper {
            position: relative;
            flex: 1;
            background-color: #0d0d0d;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        #mindmap-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .node {
            position: absolute;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .node-center {
            background-color: #ffffff;
            color: #000000;
            font-weight: bold;
            font-size: 1rem;
        }

        .node-sub {
            background-color: #2a2a2a;
            color: #ffffff;
            border: 1px solid #444;
        }

        /* 사이드바 미니 카드들 */
        .right-sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .list-container {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .list-item {
            background-color: #1a1a1a;
            padding: 0.6rem;
            border-radius: 4px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
        }
